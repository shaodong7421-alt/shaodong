name: Deploy simulator to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: public-opinion-simulator/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: public-opinion-simulator

      - name: Build
        run: npm run build
        working-directory: public-opinion-simulator
        env:
          GITHUB_PAGES: "true"

      - name: Prepare Pages artifact
        run: |
          rm -rf site-dist
          mkdir -p site-dist/simulator
          cp index.html site-dist/index.html
          cp -R public-opinion-simulator/dist/. site-dist/simulator/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
